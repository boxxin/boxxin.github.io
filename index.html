<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>boxxin</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    font-family:Inter,system-ui,sans-serif;
    background:#000;
}

.bg{
    position:fixed;
    inset:0;
    background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
    url("https://media.discordapp.net/attachments/1516466209011273808/1516514114359398482/46pfb7h.gif?ex=6a32eb54&is=6a3199d4&hm=40c0814b205646b4afeea696b9f8283c732eb58a75e814a07fb4834477681323&=&width=747&height=422")
    center/cover no-repeat;

    filter:blur(15px);
    transform:scale(1.1);
    opacity:0;
    transition:1s;
}

.bg.show{
    opacity:1;
}


.card{
    z-index:2;
    width:900px;
    max-width:95vw;
    display:flex;
    gap:18px;

    opacity:0;
    transform:scale(.75);
    transition:.8s cubic-bezier(.16,1,.3,1);
}

.card.show{
    opacity:1;
    transform:scale(1);
}


.left,
.right{
    flex:1;
    background:rgba(10,10,10,.75);
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
}


.left{
    padding:35px;
    opacity:0;
    transform:translateX(-100px);
}


.right{
    padding:25px;
    display:flex;
    align-items:center;
    justify-content:center;

    opacity:0;
    transform:translateX(100px);
}


.left.show,
.right.show{
    opacity:1;
    transform:translateX(0);
    transition:.9s cubic-bezier(.16,1,.3,1);
}


.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    display:block;
    margin:auto;
}


.username{
    text-align:center;
    color:white;
    margin-top:18px;
    font-size:32px;
}


.subtitle{
    text-align:center;
    color:#666;
    margin-top:5px;
}


.bio{
    text-align:center;
    color:#aaa;
    margin:20px auto;
    line-height:1.6;
}


.music{
    display:flex;
    align-items:center;
    gap:12px;

    background:rgba(255,255,255,.05);
    padding:15px;
    border-radius:14px;
}


.music button{
    background:none;
    border:none;
    color:white;
    font-size:20px;
    cursor:pointer;
}


.music input{
    flex:1;
    accent-color:white;
}


.music span{
    color:white;
    font-size:12px;
    font-weight:500;
}


.song-info{
    min-width:120px;
}


.song-name{
    color:white;
    font-size:13px;
    font-weight:600;
}


.song-sub{
    color:#777;
    font-size:11px;
    margin-top:3px;
}



.logo-links{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:14px;
}



.logo{
    height:75px;
    width:100%;

    border-radius:18px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);

    display:flex;
    align-items:center;

    padding:0 18px;

    text-decoration:none;
    color:white;

    transition:.25s;
}


.logo:hover{
    transform:translateX(6px);
    background:rgba(255,255,255,.1);
}



.icon{
    width:46px;
    height:46px;
    min-width:46px;

    border-radius:50%;
    overflow:hidden;

    background:rgba(255,255,255,.08);

    display:flex;
    align-items:center;
    justify-content:center;

    margin-right:16px;
}


.icon img{
    width:100%;
    height:100%;

    object-fit:cover;
    border-radius:50%;
}


.logo span{
    flex:1;
    font-size:17px;
    font-weight:600;
}


.logo small{
    color:#777;
    font-size:13px;
}


.logo::after{
    content:"→";
    color:#777;
    font-size:20px;
}



#overlay{
    position:fixed;
    inset:0;

    background:#000;

    z-index:999;

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;

    transition:.6s;
}


#overlay p{
    color:white;
    letter-spacing:.1em;
}

</style>

</head>


<body>


<div class="bg" id="bg"></div>


<div id="overlay">
    <p>click anywhere to enter</p>
</div>



<div class="card" id="card">


<div class="left" id="left">


<img class="avatar"
src="https://raw.githubusercontent.com/boxxin/boxxin.github.io/main/zwmb735.png">


<h1 class="username">
boxxin
</h1>


<p class="subtitle">
sahur.lol ownair
</p>


<p class="bio">
i genuinely dont know what to do with this site
</p>



<audio id="audio"
src="https://raw.githubusercontent.com/boxxin/boxxin.github.io/main/thethethetheemp56.mp3">
</audio>



<div class="music">


<div class="song-info">

<div class="song-name">
The The Empty - Le tigre
</div>

<div class="song-sub">
now playing
</div>

</div>


<button id="playbtn">
▶
</button>


<input
id="seek"
type="range"
min="0"
value="0"
step="0.1">


<span id="time">
0:00
</span>


</div>


</div>





<div class="right" id="right">


<div class="logo-links">



<a class="logo"
href="https://github.com/boxxin"
target="_blank">


<div class="icon">

<img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png">

</div>


<span>
GitHub
</span>

<small>
projects
</small>


</a>





<a class="logo"
href="https://youtube.com/@boxxinn"
target="_blank">


<div class="icon">

<img src="https://www.youtube.com/favicon.ico">

</div>


<span>
YouTube
</span>


<small>
videos
</small>


</a>





<a class="logo"
href="https://tiktok.com/@boxxinnn"
target="_blank">


<div class="icon">

<img src="https://www.tiktok.com/favicon.ico">

</div>


<span>
TikTok
</span>


<small>
social
</small>


</a>



</div>


</div>


</div>





<script>


const overlay = document.getElementById("overlay");
const bg = document.getElementById("bg");
const card = document.getElementById("card");

const left = document.getElementById("left");
const right = document.getElementById("right");

const audio = document.getElementById("audio");
const playbtn = document.getElementById("playbtn");

const seek = document.getElementById("seek");
const time = document.getElementById("time");



overlay.onclick = ()=>{

    audio.play().catch(()=>{});

    playbtn.textContent="⏸";

    overlay.style.opacity="0";

    bg.classList.add("show");


    setTimeout(()=>{
        card.classList.add("show");
    },250);


    setTimeout(()=>{
        left.classList.add("show");
    },800);


    setTimeout(()=>{
        right.classList.add("show");
    },1200);



    setTimeout(()=>{
        overlay.remove();
    },600);

};





playbtn.onclick = ()=>{


if(audio.paused){

    audio.play();

    playbtn.textContent="⏸";

}else{

    audio.pause();

    playbtn.textContent="▶";

}


};





audio.addEventListener("loadedmetadata",()=>{

    seek.max = audio.duration;

});





audio.addEventListener("timeupdate",()=>{


seek.value = audio.currentTime;


let m = Math.floor(audio.currentTime / 60);

let s = Math.floor(audio.currentTime % 60)
.toString()
.padStart(2,"0");


time.textContent = `${m}:${s}`;


});




seek.oninput = ()=>{

    audio.currentTime = seek.value;

};



</script>


</body>

</html>
