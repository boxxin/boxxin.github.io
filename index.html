<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>boxxin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow: hidden;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .grid-bg::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 200%;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: drift 6s linear infinite;
    }

    @keyframes drift {
      from { transform: translateY(0); }
      to { transform: translateY(-50%); }
    }

    .card {
      position: relative;
      z-index: 1;
      background: #0d0d0d;
      border: 0.5px solid #222;
      border-radius: 20px;
      padding: 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
  </style>
</head>
<body>

  <div id="overlay" onclick="const o=this;document.getElementById('audio').play();document.getElementById('playbtn').textContent='⏸';o.style.transition='opacity 0.6s';o.style.opacity='0';setTimeout(()=>o.remove(),600);" style="position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 999; display: flex; align-items: center; justify-content: center; cursor: pointer;">
    <p style="color: #fff; font-size: 16px; font-family: sans-serif; letter-spacing: 0.05em;">this site has audio — click anywhere to continue</p>
  </div>

  <div class="grid-bg"></div>

  <div class="card">
    <img src="https://raw.githubusercontent.com/boxxin/boxxin.github.io/main/zwmb735.png" alt="boxxin" style="width: 80px; height: 80px; border-radius: 50%; border: 0.5px solid #333; margin: 0 auto 1rem; display: block; object-fit: cover;" />
    <h2 style="margin: 0 0 4px; font-size: 22px; font-weight: 500; letter-spacing: -0.3px; color: #fff;">boxxin</h2>
    <p style="margin: 0 0 1.25rem; font-size: 13px; color: #555;">sahur.lol</p>
    <p style="margin: 0 0 1.75rem; font-size: 15px; line-height: 1.6; color: #777; max-width: 300px; margin-left: auto; margin-right: auto;">i genuinely dont know what to do with this site</p>

    <audio id="audio" src="https://raw.githubusercontent.com/boxxin/boxxin.github.io/main/D'Oh! Anthem.mp3"></audio>

    <div style="display: flex; align-items: center; gap: 10px; background: #111; border: 0.5px solid #222; border-radius: 10px; padding: 10px 14px; margin-bottom: 10px;">
      <button id="playbtn" onclick="const a=document.getElementById('audio');a.paused?a.play():a.pause();this.textContent=a.paused?'▶':'⏸'" style="background: none; border: none; color: #fff; font-size: 18px; cursor: pointer; width: 28px; text-align: center;">▶</button>
      <input type="range" id="seek" value="0" min="0" step="0.1" style="flex: 1; accent-color: #fff;" oninput="document.getElementById('audio').currentTime=this.value" />
      <span id="time" style="font-size: 12px; color: #666; min-width: 36px;">0:00</span>
    </div>

    <div style="display: flex; flex-direction: column; gap: 10px;">
      <a href="https://github.com/boxxin" target="_blank" style="display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 16px; background: #161616; border: 0.5px solid #2a2a2a; border-radius: 10px; font-size: 14px; font-weight: 500; color: #ccc; text-decoration: none;">github</a>
      <a href="https://youtube.com/@boxxinn" target="_blank" style="display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 16px; background: #161616; border: 0.5px solid #2a2a2a; border-radius: 10px; font-size: 14px; font-weight: 500; color: #ccc; text-decoration: none;">youtube</a>
      <a href="https://tiktok.com/@boxxinnn" target="_blank" style="display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 16px; background: #161616; border: 0.5px solid #2a2a2a; border-radius: 10px; font-size: 14px; font-weight: 500; color: #ccc; text-decoration: none;">tiktok</a>
    </div>
  </div>

  <script>
    const audio = document.getElementById('audio');
    const seek = document.getElementById('seek');
    const time = document.getElementById('time');
    audio.addEventListener('loadedmetadata', () => seek.max = audio.duration);
    audio.addEventListener('timeupdate', () => {
      seek.value = audio.currentTime;
      const m = Math.floor(audio.currentTime / 60);
      const s = Math.floor(audio.currentTime % 60).toString().padStart(2, '0');
      time.textContent = m + ':' + s;
    });
  </script>

</body>
</html>
